target-version = "py311"

[lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501", "N802", "N803", "N806", "N815"]
exclude = [".git/", ".ruff_cache/", "venv/", ".venv/", "__pycache__/"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*.py" = ["N802", "N803", "N806"]

[lint.isort]
known-first-party = ["app"]
