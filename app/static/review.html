<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BuckGen — Bounty Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --fg: #c9d1d9;
    --muted: #8b949e; --accent: #58a6ff; --good: #3fb950; --warn: #d29922;
    --danger: #f85149; --chip: #21262d;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; gap: 12px; align-items: center; padding: 10px 16px;
           border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 600; margin-right: auto; }
  header h1 span { color: var(--muted); font-weight: 400; }
  input, button, select {
    background: var(--chip); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  button { cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #238636; border-color: #2ea043; color: #fff; }
  button.danger { background: #da3633; border-color: var(--danger); color: #fff; }
  .layout { display: flex; flex: 1; min-height: 0; }
  .queue { width: 380px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--panel); }
  .queue-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .queue-item:hover { background: #1c2128; }
  .queue-item.active { background: #1f2937; border-left: 3px solid var(--accent); }
  .roi { font-size: 18px; font-weight: 700; color: var(--good); }
  .qtitle { font-size: 13px; margin: 4px 0; line-height: 1.3; }
  .meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { background: var(--chip); border-radius: 10px; padding: 1px 8px; }
  .status { text-transform: uppercase; font-size: 10px; letter-spacing: .5px; }
  .st-open{color:var(--muted)} .st-researched{color:var(--accent)} .st-drafted{color:var(--warn)}
  .st-approved{color:var(--good)} .st-applied{color:var(--good)}
  .detail { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .detail-head { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .detail-head a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .panes { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; overflow-y: auto; padding: 14px 16px; min-width: 0; }
  .pane.left { border-right: 1px solid var(--border); }
  .pane h3 { font-size: 12px; text-transform: uppercase; color: var(--muted);
             letter-spacing: .5px; margin-bottom: 8px; }
  .briefing { background: var(--chip); border-radius: 6px; padding: 10px; white-space: pre-wrap;
              font-size: 12px; line-height: 1.5; margin-bottom: 14px; }
  .issue-body { white-space: pre-wrap; font-size: 12px; line-height: 1.55; color: var(--fg); }
  textarea { width: 100%; height: calc(100% - 90px); min-height: 240px; resize: vertical;
             background: #0b0f14; color: var(--fg); border: 1px solid var(--border);
             border-radius: 6px; padding: 10px; font-family: ui-monospace, 'Cascadia Code', monospace;
             font-size: 12px; line-height: 1.5; }
  .actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .actions .note { font-size: 11px; color: var(--muted); }
  .empty { color: var(--muted); padding: 40px; text-align: center; margin: auto; }
  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
           background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
           padding: 10px 16px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  #toast.show { opacity: 1; }
  #toast.err { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>
<header>
  <h1>BuckGen <span>· Bounty Review</span></h1>
  <label class="note" style="font-size:12px;color:var(--muted)">min $/hr
    <input id="minRoi" type="number" value="0" style="width:70px" />
  </label>
  <input id="apiKey" type="password" placeholder="API key (optional)" style="width:180px" />
  <button id="refresh">Refresh queue</button>
</header>

<div class="layout">
  <div class="queue" id="queue"></div>
  <div class="detail" id="detail">
    <div class="empty">Select a bounty from the queue to review it.</div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
let queue = [];
let current = null;

function key() { return $("#apiKey").value.trim(); }
function headers(json) {
  const h = {};
  if (json) h["Content-Type"] = "application/json";
  const k = key();
  if (k) h["X-API-Key"] = k;
  return h;
}
function toast(msg, isErr) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "show" + (isErr ? " err" : "");
  setTimeout(() => (t.className = ""), 2600);
}
async function api(method, path, body) {
  const opts = { method, headers: headers(!!body) };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error(data.detail || data.error || ("HTTP " + res.status));
  return data;
}

// ---- Queue ----
async function loadQueue() {
  const min = $("#minRoi").value || 0;
  try {
    const data = await api("GET", `/bounties/review-queue?min_roi=${min}&limit=100`);
    queue = data.queue || [];
    renderQueue();
  } catch (e) { toast(e.message, true); }
}
function renderQueue() {
  const el = $("#queue");
  if (!queue.length) { el.innerHTML = `<div class="empty">Queue is empty. Run research first (POST /bounties/submit-top).</div>`; return; }
  el.innerHTML = queue.map(b => `
    <div class="queue-item ${current && current.id === b.id ? "active" : ""}" data-id="${b.id}">
      <div class="roi">$${b.roi_per_hour}/hr</div>
      <div class="qtitle">${esc(b.title)}</div>
      <div class="meta">
        <span class="chip">${esc(b.reward)}</span>
        <span class="chip">${b.effort_hours}h</span>
        <span class="chip">${Math.round(b.payout_confidence * 100)}% pay</span>
        <span class="status st-${b.status}">${b.status}</span>
      </div>
    </div>`).join("");
  el.querySelectorAll(".queue-item").forEach(item =>
    item.addEventListener("click", () => openDetail(parseInt(item.dataset.id))));
}

// ---- Detail ----
async function openDetail(id) {
  try {
    current = await api("GET", `/bounties/${id}/detail`);
    renderQueue();
    renderDetail();
  } catch (e) { toast(e.message, true); }
}
function renderDetail() {
  const b = current;
  const approved = b.status === "approved";
  const applied = b.status === "applied";
  $("#detail").innerHTML = `
    <div class="detail-head">
      <div style="font-size:14px;font-weight:600">${esc(b.title)}</div>
      <div class="meta" style="margin-top:4px">
        <span class="chip">${esc(b.reward)}</span>
        <span class="chip">~$${b.roi_per_hour}/hr</span>
        <span class="status st-${b.status}">${b.status}</span>
        <a href="${esc(b.url)}" target="_blank" rel="noopener">Open issue on GitHub ↗</a>
      </div>
    </div>
    <div class="panes">
      <div class="pane left">
        <h3>Private briefing</h3>
        <div class="briefing">${esc(b.briefing) || "<i>Not researched yet.</i>"}</div>
        <h3>Issue description</h3>
        <div class="issue-body">${esc(b.description) || "<i>No description.</i>"}</div>
      </div>
      <div class="pane right">
        <h3>Your draft ${applied ? "(posted — read only)" : "(editable)"}</h3>
        <textarea id="draftBox" ${applied ? "disabled" : ""}
          placeholder="Generate a draft, then edit it to something you'd actually post.">${esc(b.draft)}</textarea>
        <div class="actions">
          <button id="btnResearch">Research</button>
          <button id="btnDraft">Generate draft</button>
          <button id="btnSave" ${applied ? "disabled" : ""}>Save draft</button>
          <button id="btnApprove" ${applied ? "disabled" : ""}>Approve</button>
          <button id="btnPost" class="primary" ${approved ? "" : "disabled"}>Post to GitHub</button>
          <span class="note">${approved ? "Approved — posting is now enabled." :
            applied ? "Already posted." : "Approve a saved draft to enable posting."}</span>
        </div>
      </div>
    </div>`;

  $("#btnResearch").onclick = () => act("research", () => api("POST", `/bounties/${b.id}/research`), "Researched");
  $("#btnDraft").onclick = () => act("draft", () => api("POST", `/bounties/${b.id}/draft`), "Draft generated");
  $("#btnSave").onclick = saveDraft;
  $("#btnApprove").onclick = approveDraft;
  $("#btnPost").onclick = postDraft;
}

async function act(_name, fn, okMsg) {
  try { await fn(); toast(okMsg); await openDetail(current.id); await loadQueue(); }
  catch (e) { toast(e.message, true); }
}
async function saveDraft() {
  try {
    const text = $("#draftBox").value;
    const r = await api("POST", `/bounties/${current.id}/draft/save`, { text });
    toast(r.note || "Saved");
    await openDetail(current.id); await loadQueue();
  } catch (e) { toast(e.message, true); }
}
async function approveDraft() {
  // Ensure the on-screen text is what gets approved: save first.
  await saveDraft();
  try {
    const r = await api("POST", `/bounties/${current.id}/approve`);
    if (!r.success) throw new Error(r.error);
    toast("Approved — you can now post.");
    await openDetail(current.id); await loadQueue();
  } catch (e) { toast(e.message, true); }
}
async function postDraft() {
  if (!confirm(`Post this draft as a public comment on:\n${current.url}\n\nThis is a real, visible action. Continue?`)) return;
  try {
    const r = await api("POST", `/bounties/${current.id}/post?confirm=true`);
    if (!r.success) throw new Error(r.error);
    toast(`Posted to ${r.repo}#${r.issue_number}`);
    await openDetail(current.id); await loadQueue();
  } catch (e) { toast(e.message, true); }
}

function esc(s) {
  return (s || "").replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

$("#refresh").onclick = loadQueue;
$("#minRoi").addEventListener("change", loadQueue);
// Persist API key across reloads for convenience (this browser only).
$("#apiKey").value = sessionStorage.getItem("buckgen_key") || "";
$("#apiKey").addEventListener("change", () => sessionStorage.setItem("buckgen_key", key()));
loadQueue();
</script>
</body>
</html>
